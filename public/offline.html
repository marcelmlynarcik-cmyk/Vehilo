<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f766e" />
    <title>Vehilo je offline</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        max-width: 440px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 20px;
        color: #475569;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        border-radius: 8px;
        background: #0f766e;
        color: white;
        padding: 0 14px;
        text-decoration: none;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          background: #020617;
          color: #f8fafc;
        }

        p {
          color: #cbd5e1;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Vehilo je offline</h1>
      <p>
        Aplikace je nainstalovaná, ale aktuálně se nepodařilo načíst živá data.
        Připojte se k internetu a zkuste stránku otevřít znovu.
      </p>
      <a href="/dashboard">Zkusit znovu</a>
    </main>
  </body>
</html>
